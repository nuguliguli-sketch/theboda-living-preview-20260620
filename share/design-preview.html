:root {
  --brand-blue: #4a90d9;
  --brand-deep: #1a3669;
  --brand-light: #6aaee8;
  --text-primary: #0a1628;
  --text-secondary: #4a6a8a;
  --bg-page: #ffffff;
  --bg-section: #f4f7fb;
  --ok: #27ae60; --warn: #e67e22; --danger: #c0392b;
  --radius-btn: 8px; --radius-card: 14px; --radius-badge: 9999px;
}
* { box-sizing: border-box; }
body {
  margin: 0; font-family: "Pretendard Variable", Pretendard, "Noto Sans KR", sans-serif;
  color: var(--text-primary); background: var(--bg-page); line-height: 1.5;
}
header.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; background: var(--brand-deep); color: #fff;
}
header.topbar .brand { font-weight: 700; }
main { max-width: 880px; margin: 0 auto; padding: 24px; }
h1, h2 { color: var(--text-primary); }
.card {
  background: var(--bg-page); border: 1px solid #e3ebf5; border-radius: var(--radius-card);
  padding: 20px; margin-bottom: 16px;
}
.row { display: flex; gap: 12px; align-items: center; }
label { display: block; font-size: 13px; color: var(--text-secondary); margin: 8px 0 4px; }
input, select, textarea {
  width: 100%; padding: 10px 12px; border: 1px solid #cdd8e6; border-radius: var(--radius-btn);
  font: inherit; color: var(--text-primary);
}
button {
  font: inherit; cursor: pointer; border: none; border-radius: var(--radius-btn);
  padding: 10px 16px; background: var(--bg-section); color: var(--text-primary);
}
button.primary { background: var(--brand-deep); color: #fff; }
button.ghost { background: transparent; color: var(--brand-blue); }
.list-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid #eef3f9; cursor: pointer;
}
.badge {
  display: inline-block; padding: 2px 10px; border-radius: var(--radius-badge);
  font-size: 12px; background: var(--bg-section); color: var(--text-secondary);
}
.badge.approved { background: #f0fff4; color: var(--ok); }
.badge.draft { background: #fff8e1; color: var(--warn); }
.badge.hidden { background: #fff0f0; color: var(--danger); }
.error { color: var(--danger); font-size: 13px; margin-top: 8px; }
.muted { color: var(--text-secondary); font-size: 13px; }
.hidden-view { display: none; }

.demo-note { max-width: 880px; margin: 0 auto; padding: 8px 24px 0; }
.demo-note .pill { display:inline-block; background:#fff8e1; color:#e67e22; border-radius:9999px; padding:4px 12px; font-size:12px; font-weight:600; }

  async function render() {
    const route = parseHash(location.hash);
    const loggedIn = useMock || auth.isLoggedIn();
    logoutBtn.classList.toggle("hidden-view", !loggedIn);
    if (!loggedIn && route.name !== "login") {
      go("#/login");
      return;
    }
    if (loggedIn && route.name === "login") {
      go("#/customers");
      return;
    }
    try {
      if (route.name === "login") return renderLogin(root, { auth, onSuccess: () => go("#/customers") });
      if (route.name === "customers") return await renderCustomers(root, { api, go });
      if (route.name === "projects") return await renderProjects(root, { api, go });
      if (route.name === "project-detail") return await renderProjectDetail(root, { api, go, projectId: route.params.projectId });
      if (route.name === "project-design") return await renderProjectDesign(root, { api, go, projectId: route.params.projectId });
    } catch (e) {
      root.replaceChildren(Object.assign(document.createElement("p"), { className: "error", textContent: e.message || "오류" }));
    }
  }
  window.addEventListener("hashchange", render);
  render();
})();

  </script>
</body>
</html>
